[mcp]
transport = "stdio"
host = "127.0.0.1"
port = 8766

[beamng]
host = "127.0.0.1"
port = 25252
# home = "C:/Games/BeamNG.drive"
# Prefer the direct 64-bit simulator executable. A path relative to `home` avoids
# launcher rediscovery; use BeamNG.tech.x64.exe for a licensed Tech installation.
# binary = "Bin64/BeamNG.drive.x64.exe"
# BeamNG 0.37+ default; a custom userFolder in BeamNG.drive.ini takes precedence.
# Configure the exact active folder. When launching a folder named `current`,
# beamng-mcp passes its parent to BeamNG's `-userpath` argument automatically.
# user = "C:/Users/you/AppData/Local/BeamNG/BeamNG.drive/current"
launch = true

[blender]
# Side-by-side portable installs are supported. `doctor` executes this binary in
# background mode with its active user/add-on profile, then verifies an unambiguous
# selection-only DAE exporter and the deterministic glTF option contract.
# executable = "C:/Users/you/Applications/Blender/4.5.4/blender.exe"
probe_timeout_seconds = 20.0

[lua]
url = "ws://127.0.0.1:8765"
request_timeout_seconds = 5.0
max_message_bytes = 1048576
# Engine-side autonomy deadman: renew within each lease window; allow bounded startup time.
safety_lease_seconds = 1.0
safety_startup_grace_seconds = 5.0

[workspace]
# root = "C:/Users/you/BeamNG-MCP/workspace"
allow_persistent_map_edits = false
allow_existing_map_object_edits = false
allow_mod_install = false
max_file_bytes = 2097152
max_mod_files = 4096
max_mod_bytes = 536870912
# Blender handoffs are one-use and bounded; keep the cage sparse.
asset_staging_ttl_seconds = 3600
max_asset_staging_slots = 16
max_structural_nodes = 512
max_structural_beams = 4096
max_structural_triangles = 2048
max_structural_actuators = 128

[vision]
# Production camera-driven modes require BeamNG.tech in the tested 0.38 generation.
backend = "classical"
target_fps = 15.0
frame_timeout_seconds = 0.35
input_width = 640
input_height = 360
max_gpu_memory_mb = 4096
# model = "nvidia/segformer-b0-finetuned-cityscapes-512-1024"
# onnx_path = "models/drivable-area.onnx"
